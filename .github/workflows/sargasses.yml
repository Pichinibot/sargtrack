name: Mise à jour indice sargasses

on:
  schedule:
    - cron: "0 10 * * *"   # tous les jours à 10h UTC (~6h Guadeloupe)
  workflow_dispatch:        # bouton manuel dans l'onglet Actions

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Récupérer et enregistrer l'indice sargasses
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/fetch_sargasses.py
