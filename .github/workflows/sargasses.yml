name: Mise à jour indice sargasses

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Récupérer et enregistrer l'indice sargasses
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
        run: python scripts/fetch_sargasses.py
